<script type="module">
import { xmlToJSON } from "./js/transform.js";
import { renderJuegos } from "./js/ui.js";

async function cargarJuegos() {
    const respuesta = await fetch("./data/juegos.xml");
    const xmlString = await respuesta.text();

    const juegosJSON = xmlToJSON(xmlString);

    renderJuegos(juegosJSON);
}

cargarJuegos();
</script>
