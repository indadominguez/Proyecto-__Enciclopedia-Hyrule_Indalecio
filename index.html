<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enciclopedia Hyliana - Buscador de Zelda</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

    <main class="pagina">

        <header class="cabecera">
            <h1 class="titulo">Enciclopedia Hyliana</h1>
            <p class="subtitulo">Explora Legend of Zelda</p>
        </header>

        <nav class="tipos">
            <ul>
            <li><button class="tipo activo" data-categoria="juegos">🎮 Juegos</button></li>
            <li><button class="tipo" data-categoria="personajes">🛡️ Personajes</button></li>
            <li><button class="tipo" data-categoria="monstruos">⚔️ Monstruos</button></li>
            </ul>
        </nav>

        <section class="buscador">
            <form class="formulario-busqueda" id="searchForm">
            <label for="entradaBusqueda" class="oculto">Buscar</label>
            <input type="text" class="entrada-busqueda" id="entradaBusqueda" placeholder="Buscar...">
            <button type="submit" class="boton-busqueda" id="botonBusqueda">🔍</button>
            </form>
        </section>

        <section class="resultados" id="results">
            <p class="mensaje" id="message"></p>
        </section>
    </main>

    <footer class="pie">
            <p>Enciclopedia Hyliana © 2026 - Proyecto de Lenguaje de Marcas</p>
    </footer>

</body>
</html>
